<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);
  --green:#4ade80;--green-bg:rgba(74,222,128,.1);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);
  --purple-bg:rgba(167,139,250,.1);
  --orange-bg:rgba(251,146,60,.08);--orange:#fb923c;
  --r:8px;--rs:5px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
.app{max-width:1280px;margin:0 auto;padding:1.25rem;}
.pg{display:none;}.pg.on{display:block;}
.nav{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap;}
.nb{padding:10px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.nb.on{color:var(--text);border-bottom-color:var(--amber);font-weight:600;}
.nb:hover:not(.on){color:var(--text);}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:8px;margin-bottom:1.25rem;}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;cursor:pointer;}
.mc:hover,.mc.ativo{border-color:var(--amber);}
.ml{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.mv{font-size:20px;font-weight:700;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.cp{padding:1rem 1.25rem;}
.stitle{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
th{text-align:left;padding:7px 10px;font-size:10px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.rtop td{background:rgba(251,191,36,.07);}
tr.rpm td{opacity:.6;}
tr.rrec td{background:rgba(248,113,113,.06);}
tr.rdup td{background:rgba(251,146,60,.06);}
td.cpfm{font-family:'Courier New',monospace;font-size:11px;color:#a78bfa;overflow:visible;white-space:nowrap;}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap;}
.bo{background:var(--green-bg);color:var(--green);}
.bb{background:var(--blue-bg);color:var(--blue);}
.br{background:var(--red-bg);color:var(--red);}
.sc{background:var(--blue-bg);color:var(--blue);}
.sp{background:var(--purple-bg);color:#a78bfa;}
.sa{background:var(--green-bg);color:var(--green);}
.sco{background:var(--amber-bg);color:var(--amber);}
.sr{background:var(--red-bg);color:var(--red);}
.spe{background:var(--red-bg);color:#f43f5e;}
.sv{background:var(--green-bg);color:#22c55e;}
.srec{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.sdup{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(251,146,60,.3);}
.dbadge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;background:var(--amber-bg);color:var(--amber);margin-left:3px;}
.rn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;}
.r1{background:#fbbf24;color:#000;}.r2{background:#9ca3af;color:#000;}.r3{background:#cd7c5e;color:#000;}.rx{background:var(--bg3);color:var(--text2);}
.av{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#1e1b4b;color:#a78bfa;font-size:12px;font-weight:700;flex-shrink:0;}
.cor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem;}
.cor-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.875rem;cursor:pointer;display:flex;align-items:center;gap:10px;}
.cor-card:hover{border-color:var(--border2);}
.subtabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.st{padding:5px 12px;font-size:12px;border-radius:var(--rs);border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);}
.st.on{background:var(--amber);color:#000;border-color:var(--amber);font-weight:600;}
.al{padding:10px 14px;border-radius:var(--rs);font-size:12px;margin-bottom:10px;}
.aw{background:var(--amber-bg);border:1px solid rgba(251,191,36,.3);color:var(--amber);}
.ai{background:var(--blue-bg);border:1px solid rgba(96,165,250,.2);color:var(--blue);}
.ag{background:var(--green-bg);border:1px solid rgba(74,222,128,.2);color:var(--green);}
.ae{background:var(--red-bg);border:1px solid rgba(248,113,113,.3);color:var(--red);}
.adup{background:var(--orange-bg);border:1px solid rgba(251,146,60,.3);color:var(--orange);}
.btn{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--text);font-size:12px;cursor:pointer;}
.btn:hover{background:var(--bg3);}
.btnp{background:var(--amber);color:#000;border-color:var(--amber);font-weight:600;}
.btnp:hover{opacity:.85;}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:1rem;border:none;background:none;padding:0;}
.back:hover{color:var(--text);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.fg input,.fg select{padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);}
.ist{border:1px solid var(--border);background:var(--bg3);font-size:11px;cursor:pointer;color:var(--text);padding:3px 6px;border-radius:var(--rs);max-width:120px;}
.drop{border:1.5px dashed var(--border2);border-radius:var(--r);padding:2rem;text-align:center;cursor:pointer;}
.drop:hover{background:var(--bg3);}
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.fbar input{padding:5px 10px;font-size:12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg3);color:var(--text);}
.chip{padding:4px 10px;font-size:11px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;}
.chip.on{background:var(--amber);color:#000;border-color:var(--amber);font-weight:600;}
.sep{margin:1.25rem 0 .75rem;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);padding-bottom:6px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;max-width:420px;width:90%;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:.75rem;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:.75rem;line-height:1.55;}
.btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:1rem;}
.cob-cell{display:flex;flex-direction:column;gap:3px;}
.cob-row{display:flex;align-items:center;gap:4px;font-size:10px;white-space:nowrap;}
.cob-icon{width:14px;text-align:center;flex-shrink:0;}
.cob-label{color:var(--text3);font-size:9px;text-transform:uppercase;width:38px;flex-shrink:0;}
.cob-val{font-size:11px;font-weight:500;}
.cob-venc{color:var(--amber);}
.cob-ok{color:var(--text2);}
hr.cdiv{border:none;border-top:1px solid var(--border);margin:2px 0;}
</style>
</head>

function fMov(ano){

function rL1(el,lst,tot,fil){

function rL2(el,lst,tot,fil){
  const gN={reconsultar:'Reconsultar',em_conversa:'Em conversa',pasta:'Pasta',aprovado:'Aprovado',condicionado:'Condicionado',reprovado:'Reprovado',perdido:'Perdido'};
  let h=fBar(tot,fil);h+=`<div class="al ai">Todos os CPFs por situacao</div>`;
  const rec=lst.filter(c=>c.reconsultar),rest=lst.filter(c=>!c.reconsultar);
  let ok=false;
  if(rec.length){ok=true;h+=`<div class="sep">${gN['reconsultar']} (${rec.length})</div>${tabHTML(rec)}`;}
  ['em_conversa','pasta','aprovado','condicionado','reprovado','perdido'].forEach(g=>{
    const l=rest.filter(c=>c.sit===g);if(!l.length)return;ok=true;
    if(g==='aprovado'||g==='condicionado'){
      const tp=l.filter(c=>!c.proxMes),pm=l.filter(c=>c.proxMes);
      if(tp.length)h+=`<div class="sep">${gN[g]} no topo (${tp.length})</div>${tabHTML(tp)}`;
      if(pm.length)h+=`<div class="sep">${gN[g]} prox.mes (${pm.length})</div>${tabHTML(pm)}`;
    } else h+=`<div class="sep">${gN[g]} (${l.length})</div>${tabHTML(l)}`;
  });
  if(!ok)h+=tabHTML([]);
  el.innerHTML=h;
}

  const dt=document.getElementById('mdt').value||h,classe=clf(isNaN(v)?0:v,cx);
  const cobr=classe==='ruim'?null:pduA(h,1);
  const novo={id:Date.now(),nome,cpf:document.getElementById('mcp').value.trim(),corretor:cor,valor:isNaN(v)?0:v,classe,data:dt,obs:document.getElementById('mob').value.trim(),sit:'em_conversa',sitAt:h,cobrarEm:cobr,cobrarEmOriginal:cobr,proxMes:false,reconsultar:false,dupDe:null,cobrado:false,inativo4d:false};
  const ex=cpfEx(novo.cpf);
  if(ex&&ex.corretor!==cor){showMod(novo,ex);return;}
  db.cpfs.push(novo);sv();finSalvar();
}

async function hXLS(inp){
  const file=inp.files[0];if(!file)return;
  const st=document.getElementById('pst');
  st.innerHTML='<div class="al aw">Lendo planilha...</div>';
  try{
    if(typeof XLSX==='undefined'){st.innerHTML='<div class="al ae">Biblioteca Excel nao carregou. Verifique sua conexao com a internet.</div>';return;}
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
    parseXLS(rows,st);
  }catch(e){
    st.innerHTML=`<div class="al ae">Erro: ${e.message||'verifique o arquivo .xlsx'}.</div>`;
  }
  inp.value='';
}

function parseXLS(rows,stEl){
  const hoje=hj(),cobr=pduA(hoje,1);
  const noms=db.cors.map(c=>c.toLowerCase().trim());
  const regs=[],dups=[];
  let baseCols=[];
  for(let ri=0;ri<Math.min(8,rows.length);ri++){
    const row=rows[ri],found=[];
    for(let ci=0;ci<(row.length||0);ci++){
      const v=String(row[ci]||'').trim().toLowerCase();
      if(v&&noms.includes(v))found.push(ci);
    }
    if(found.length>=1){baseCols=found;break;}
  }
  if(!baseCols.length)baseCols=[0,5,10];
  const blocos=baseCols.map(bc=>({bc,bn:bc+1,bcp:bc+2,bo:bc+3}));
  const corAt={};blocos.forEach(b=>corAt[b.bc]=null);
  rows.forEach(row=>{
    blocos.forEach(({bc,bn,bcp,bo})=>{
      const v0=String(row[bc]||'').trim();
      const idx=noms.findIndex(n=>v0.toLowerCase().trim()===n);
      if(idx>=0){corAt[bc]=db.cors[idx];return;}
      const cor=corAt[bc];if(!cor)return;
      const nR=String(row[bn]||'').trim(),cpfR=row[bcp],obsR=String(row[bo]||'').trim();
      const cpf=normCpf(cpfR);
      const nome=(nR.length>1&&!/^\d+$/.test(nR))?nR:'';
      if(!cpf&&!nome)return;
      const cx=/caixa/i.test(obsR);
      let val=0;
      const vm=obsR.match(/r\$\s*([\d.,]+)/i)||obsR.match(/(\d{1,3}(?:[.,]\d{3})*(?:[.,]\d{1,2})?)/);
      if(vm&&!cx){const vs=vm[1].replace(/\./g,'').replace(',','.');const p=parseFloat(vs);if(!isNaN(p)&&p<10000000)val=p;}
      if(/limpo|lempo|sem\s*restri/i.test(obsR)||(!vm&&!cx))val=0;
      const classe=clf(val,cx);
      const cobFinal=classe==='ruim'?null:cobr;
      const novo={id:Date.now()+Math.random(),nome:nome?nome.replace(/\b\w/g,l=>l.toUpperCase()):'',cpf,corretor:cor,valor:val,classe,data:hoje,obs:obsR,sit:'em_conversa',sitAt:hoje,cobrarEm:cobFinal,cobrarEmOriginal:cobFinal,proxMes:false,reconsultar:false,dupDe:null,cobrado:false,inativo4d:false};
      const ex=cpfEx(cpf);
      if(ex&&ex.corretor!==cor){novo.dupDe=ex.corretor;dups.push({novo:nome||cpf,corNovo:cor,corAnt:ex.corretor});}
      regs.push(novo);
    });
  });
  const pv=document.getElementById('ppv');
  if(!regs.length){stEl.innerHTML=`<div class="al ae">Nenhum lead detectado.<br><span style="font-size:11px;">Corretores esperados: <strong>${db.cors.join(', ')}</strong></span></div>`;return;}
  const porCor={};regs.forEach(r=>{if(!porCor[r.corretor])porCor[r.corretor]=[];porCor[r.corretor].push(r);});
  stEl.innerHTML=`<div class="al ag">${regs.length} lead(s) - cadastrado ${fD(hoje)} - cobrar ${fD(cobr)}</div>${dups.length?`<div class="al adup">${dups.length} duplicado(s): ${dups.map(d=>`<strong>${d.novo}</strong> (${d.corNovo} x ${d.corAnt})`).join(', ')}</div>`:''}`;
  let t='';
  Object.entries(porCor).forEach(([cor,lst])=>{t+=`<div class="sep" style="margin-top:1rem;">${cor} - ${lst.length}</div><div class="card"><table><thead><tr><th>Nome</th><th style="width:132px;">CPF</th><th style="width:90px;">Restricao</th><th style="width:58px;">Qual.</th></tr></thead><tbody>${lst.map(r=>`<tr${r.dupDe?' class="rdup"':''}><td style="font-size:12px;font-weight:600;">${r.nome||'--'}</td><td class="cpfm" style="overflow:visible;">${r.cpf||'--'}</td><td style="font-size:11px;">${fV(r.valor)}</td><td>${cB(r.classe)}</td></tr>`).join('')}</tbody></table></div>`;});
  pv.innerHTML=t+`<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">
    <button class="btn" onclick="document.getElementById('ppv').innerHTML='';document.getElementById('pst').innerHTML='';">Cancelar</button>
    <button class="btn btnp" onclick="confXLS(${encodeURIComponent(JSON.stringify(regs))})">Confirmar</button>
  </div>`;
}
function confXLS(enc){db.cpfs.push(...JSON.parse(decodeURIComponent(enc)));sv();document.getElementById('pst').innerHTML='<div class="al ag">Importado!</div>';document.getElementById('ppv').innerHTML='';nav('home');}

    <div class="card cp" style="border:1px solid rgba(251,191,36,.3);margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div><p style="font-size:14px;font-weight:700;color:#fbbf24;">Atualizacao de sistema</p>
        <p style="font-size:12px;color:#999;margin-top:3px;">Siga o passo a passo para atualizar sem perder seus dados</p></div>
        ${confSenhaOk?`<span style="font-size:12px;color:#fbbf24;">Desbloqueado</span>`:`<div style="display:flex;gap:8px;align-items:center;">
          <input type="password" id="inp-senha" placeholder="Senha" maxlength="10" style="width:100px;padding:7px 10px;font-size:13px;border:1px solid #3a3a3a;border-radius:5px;background:#222;color:#f0f0f0;" onkeydown="if(event.key==='Enter')chkS()">
          <button class="btn btnp" onclick="chkS()">Entrar</button></div>`}
      </div>
      ${confSenhaOk?painelAtual():''}
    </div>
    <div class="card cp">

      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="text" id="nci" placeholder="Nome do corretor" style="flex:1;padding:8px 10px;font-size:13px;border:1px solid #3a3a3a;border-radius:5px;background:#222;color:#f0f0f0;">
        <button class="btn btnp" onclick="addCor()">Adicionar</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${db.cors.map(c=>`<div style="display:flex;align-items:center;gap:6px;background:#222;border:1px solid #2e2e2e;border-radius:5px;padding:5px 12px;font-size:13px;">${c}<button onclick="remCor('${c}')" style="background:none;border:none;cursor:pointer;color:#999;font-size:15px;line-height:1;padding:0 2px;">&times;</button></div>`).join('')}</div>
    </div>
    <div class="card cp" style="margin-top:0;">
      <p class="stitle">Proximos dias uteis</p>
      <p style="font-size:12px;color:#999;">Amanha: <strong style="color:#f0f0f0;">${fD(pduA(h,1))}</strong> &nbsp;-&nbsp; 1o dia util prox. mes: <strong style="color:#f0f0f0;">${fD(ipm(h))}</strong></p>
      <p style="font-size:11px;color:#555;margin-top:6px;">Feriados: nacionais + Cuiaba + Varzea Grande + Carnaval/Pascoa/Corpus Christi moveis</p>
    </div>
    <div class="card cp" style="margin-top:0;">
      <p class="stitle">Dados</p>
      <button class="btn" style="color:#f87171;border-color:rgba(248,113,113,.3);padding:7px 14px;" onclick="rst()">Limpar tudo</button>
    </div>`;
}

function painelAtual(){
  return`<div style="margin-top:1rem;border-top:1px solid #2e2e2e;padding-top:1rem;">
    <p style="font-size:12px;font-weight:700;margin-bottom:12px;">Como atualizar sem perder dados:</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;">
      ${['1 - <strong>Exporte</strong> seus dados abaixo (arquivo .json)',
         '2 - <strong>Peca a atualizacao</strong> no Claude.ai',

        <button class="btn" style="width:100%;border-color:#fbbf24;color:#fbbf24;" onclick="document.getElementById('imp-j').click()">Carregar backup (.json)</button>

  </div>`;

function chkS(){
  const v=(document.getElementById('inp-senha')||{}).value;
  if(v==='537474'){confSenhaOk=true;rCfg();}
  else{const e=document.getElementById('inp-senha');if(e){e.style.borderColor='#f87171';e.value='';e.placeholder='Senha incorreta';}}
}

function impJ(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.cors&&!d.corretores)throw new Error('Formato invalido');
      if(d.corretores&&!d.cors)d.cors=d.corretores;
      if(d.vendidos&&!d.vend)d.vend=d.vendidos;
      db=d;if(!db.vend)db.vend=[];sv();
      document.getElementById('imp-msg').innerHTML=`<div class="al ag">${db.cpfs.length} CPFs carregados!</div>`;
      setTimeout(()=>nav('home'),1500);
    }catch(err){document.getElementById('imp-msg').innerHTML='<div class="al ae">Arquivo invalido.</div>';}
  };
  r.readAsText(file);inp.value='';
}

function addCor(){const n=(document.getElementById('nci')||{}).value?.trim();if(!n||db.cors.includes(n))return;db.cors.push(n);db.cors.sort((a,b)=>a.localeCompare(b,'pt-BR'));sv();rCfg();}
function remCor(n){if(db.cpfs.some(c=>c.corretor===n)){alert('Corretor tem CPFs.');return;}db.cors=db.cors.filter(c=>c!==n);sv();rCfg();}
function exp(){const b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='backup_cpf_'+hj()+'.json';a.click();}
function rst(){if(!confirm('Apagar TODOS os dados?'))return;db={cors:[...db.cors],cpfs:[],vend:[]};sv();nav('home');}

nav('home');

</script>
